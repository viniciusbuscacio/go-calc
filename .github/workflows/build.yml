name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: go test
        run: go test ./internal/...

  build:
    name: build (${{ matrix.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            artifact: build/bin/*
          - name: linux
            os: ubuntu-latest
            artifact: build/bin/*
          - name: macos
            os: macos-latest
            artifact: go-calc-macos.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux deps
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build
        run: go run ./tools/build

      # upload-artifact's own zip drops the executable bits inside the .app
      # bundle, so zip it with ditto first (same approach as release.yml) and
      # upload the zip instead.
      - name: Zip .app (macOS)
        if: matrix.name == 'macos'
        shell: bash
        run: ditto -c -k --sequesterRsrc --keepParent build/bin/go-calc.app go-calc-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-calc-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn
